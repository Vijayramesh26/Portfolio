<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="icon" href="<%= BASE_URL %>favicon.ico">
    <link rel="canonical" href="https://rameshvijay-portfolio.web.app/" />

    <!-- ── High-Performance SEO Meta Tags ── -->
    <title>Vijay Ramesh | Master Full-Stack Developer & Software Engineer</title>
    <meta name="description" content="Vijay Ramesh is a premium Full-Stack Developer and Software Engineer specializing in Vue.js, Golang, and Nuxt.js. Explore interactive 3D blueprint workspaces, Git commit timelines, and Postman-style API composers.">
    <meta name="keywords" content="Vijay Ramesh, Full Stack Developer, Software Engineer, Vue.js, Golang Developer, Nuxt.js, Chennai, Web Developer, Web3forms, Gin Gonic, Interactive Portfolio">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Vijay Ramesh">

    <!-- ── Open Graph / Facebook Previews ── -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://rameshvijay-portfolio.web.app/">
    <meta property="og:title" content="Vijay Ramesh | Master Full-Stack Developer & Software Engineer">
    <meta property="og:description" content="Premium interactive portfolio featuring a raw-canvas 3D hologram workspace, Git branching graphs, and Postman API contact composer. Built with Vue.js & Golang.">
    <meta property="og:image" content="https://rameshvijay-portfolio.web.app/Projects/portfolio.png">

    <!-- ── Twitter Card Previews ── -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://rameshvijay-portfolio.web.app/">
    <meta property="twitter:title" content="Vijay Ramesh | Master Full-Stack Developer & Software Engineer">
    <meta property="twitter:description" content="Premium interactive portfolio featuring a raw-canvas 3D hologram workspace, Git branching graphs, and Postman API contact composer. Built with Vue.js & Golang.">
    <meta property="twitter:image" content="https://rameshvijay-portfolio.web.app/Projects/portfolio.png">

    <!-- ── Typography & CSS Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
  </head>
  <body>
    <noscript>
      <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
  </body>
</html>
